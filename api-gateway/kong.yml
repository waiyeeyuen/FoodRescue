_format_version: "3.0"

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
      exposed_headers:
        - Authorization
      credentials: true
      max_age: 3600

services:
  - name: orchestrator
    url: http://orchestrator:8001
    routes:
      - name: orchestrator-route
        paths:
          - /order
          - /expiry
          - /recommend
          - /checkout
 
_format_version: "3.0"

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
      exposed_headers:
        - Authorization
      credentials: true
      max_age: 3600
services:

- name: recommendation
  url: http://recommendation:3000

- name: expiry
  url: http://expiry:3000

- name: checkout
  url: http://checkout:3000

- name: place-order
  url: http://place-order:3000


routes:

- name: recommendation-route
  service: recommendation
  paths:
    - /recommend

- name: expiry-route
  service: expiry
  paths:
    - /expiry

- name: checkout-route
  service: checkout
  paths:
    - /checkout

- name: place-order-route
  service: place-order
  paths:
    - /place-order
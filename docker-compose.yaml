services:
  kong:
    image: kong:3.7
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    volumes:
      - ./infra/kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      - rabbitmq
    networks: [internal]

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks: [internal]
  frontend:
    build: ./apps/frontend
    networks: [internal]
    depends_on: [kong]
    
  order-service:
    build: ./services/order-service
    depends_on: [rabbitmq]
    environment:
      PORT: "3000"
      SERVICE_NAME: "order-service"
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672
    networks: [internal]

  listing-service:
    build: ./services/listing-service
    depends_on: [rabbitmq]
    environment:
      PORT: "3000"
      SERVICE_NAME: "listing-service"
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672
    networks: [internal]

  inventory-service:
    build: ./services/inventory-service
    depends_on: [rabbitmq]
    environment:
      PORT: "3000"
      SERVICE_NAME: "inventory-service"
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672
    networks: [internal]

  payment-service:
    build: ./services/payment-service
    depends_on: [rabbitmq]
    environment:
      PORT: "3000"
      SERVICE_NAME: "payment-service"
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672
    networks: [internal]

  notification-service:
    build: ./services/notification-service
    depends_on: [rabbitmq]
    environment:
      PORT: "3000"
      SERVICE_NAME: "notification-service"
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672
    networks: [internal]

networks:
  internal:
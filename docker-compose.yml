version: "3"

services:

  recommendation-service:
    build: ./services/recommendation-service

  inventory-service:
    build: ./services/inventory-service

  payment-service:
    build: ./services/payment-service

  order-service:
    build: ./services/order-service

  notification-service:
    build: ./services/notification-service

  error-service:
    build: ./services/error-service


  recommendation:
    build: ./orchestrator/get-recommendation

  expiry:
    build: ./orchestrator/expiry-food

  checkout:
    build: ./orchestrator/checkout

  place-order:
    build: ./orchestrator/place-order


  kong:
    image: kong:3.6
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./api-gateway/kong.yml:/kong/kong.yml
    ports:
      - "8000:8000"
      - "8001:8001"
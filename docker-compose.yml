version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: foodrescue-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment:
    build: ./services/payment
    ports:
      - "3003:3003"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PORT: 3003

  inventory-consumer:
    build: ./services/inventory
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PLACE_ORDER_SERVICE_URL: http://place-order:4001

  place-order:
    build: ./composite/place-order
    ports:
      - "4001:4001"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PAYMENT_SERVICE_URL: http://payment:3003
      ORDER_SERVICE_URL: http://order:3004
      NOTIFICATION_SERVICE_URL: http://notification:3006

  notification:
    build: ./services/notification
    ports:
      - "3006:3006"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
